name: verify

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

concurrency:
  group: kernel-authz-runtime-contract
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/authz-runtime-service-contract
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      - name: Apply Kernel root test repairs
        run: python3 .github/scripts/fix_kernel_root_tests.py

      - name: Format repaired sources
        run: gofmt -w cmd/kernel/internal/project/project.go cmd/protoc-gen-aisphere-gateway/main.go authz/service.go authz/service_contract_test.go

      - name: Download dependencies
        run: go mod download

      - name: Root tests
        run: make test

      - name: Command submodule tests
        run: make test-cmd

      - name: Race tests
        run: make test-race

      - name: Vet
        run: make vet

      - name: Coverage
        run: make cover

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: make vuln

      - name: Commit final Kernel repair
        shell: bash
        run: |
          set -euxo pipefail
          git checkout origin/master -- .github/workflows/verify.yml
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/verify.yml')
          content = path.read_text(encoding='utf-8')
          content = content.replace("go-version: '1.25.x'", "go-version: '1.25.12'")
          path.write_text(content, encoding='utf-8')
          PY
          rm -f .github/scripts/fix_kernel_root_tests.py .github/kernel-root-test-failure.txt .github/kernel-govulncheck-failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "fix: stabilize Kernel authz contract verification"
          fi
          git push origin HEAD:fix/authz-runtime-service-contract
