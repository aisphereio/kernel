name: verify

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: kernel-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout pull request HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go from go.mod
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test contract and generator packages
        run: >-
          go test
          ./cmd/openapi-contract
          ./cmd/buf-check-aisphere
          ./cmd/protoc-gen-go-http
          ./transportx/http
          -count=1

      - name: Test Kernel runtime
        run: make test

      - name: Test command packages
        run: make test-cmd

      - name: Vet
        run: make vet

      - name: Exercise deterministic OpenAPI contract output
        shell: bash
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/openapi-contract"
          mkdir -p "$work"
          printf '%s\n' '{"swagger":"2.0","info":{},"paths":{"/v1/ping":{"get":{"operationId":"Health_Ping","tags":["Health"],"responses":{"default":{"description":"Error"}}}}}}' > "$work/input.json"
          go run ./cmd/openapi-contract \
            --input "$work/input.json" \
            --output "$work/output.json" \
            --title "Temporary API" \
            --version "${GITHUB_SHA}"
          cp "$work/output.json" "$work/first.json"
          go run ./cmd/openapi-contract \
            --input "$work/input.json" \
            --output "$work/output.json" \
            --title "Temporary API" \
            --version "${GITHUB_SHA}"
          cmp "$work/first.json" "$work/output.json"

      - name: Reject repository mutations
        run: git diff --exit-code
