name: verify

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Root tests
        run: make test

      - name: Taskx tests
        run: go test ./taskx

      - name: Command submodule tests
        run: make test-cmd

      - name: Race tests
        run: make test-race

      - name: Taskx race tests
        run: go test -race ./taskx

      - name: Vet
        run: make vet

      - name: Coverage
        run: make cover

      - name: Taskx coverage
        run: go test ./taskx -coverprofile taskx-coverage.out

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: make vuln
