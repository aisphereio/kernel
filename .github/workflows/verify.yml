name: verify

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

concurrency:
  group: kernel-authz-runtime-contract
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/authz-runtime-service-contract
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Apply Kernel root test repairs
        run: python3 .github/scripts/fix_kernel_root_tests.py

      - name: Format repaired sources
        run: gofmt -w cmd/kernel/internal/project/project.go cmd/protoc-gen-aisphere-gateway/main.go authz/service.go authz/service_contract_test.go

      - name: Download dependencies
        run: go mod download

      - name: Root tests
        run: make test

      - name: Command submodule tests
        run: make test-cmd

      - name: Race tests
        run: make test-race

      - name: Vet
        run: make vet

      - name: Coverage
        run: make cover

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        id: vuln
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          make vuln 2>&1 | tee /tmp/kernel-govulncheck.txt

      - name: Persist vulnerability diagnostics
        if: steps.vuln.outcome == 'failure'
        run: |
          cp /tmp/kernel-govulncheck.txt .github/kernel-govulncheck-failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f .github/kernel-govulncheck-failure.txt
          git commit -m "chore: capture Kernel vulnerability scan failure" || true
          git push origin HEAD:fix/authz-runtime-service-contract
          exit 1

      - name: Commit final Kernel repair
        run: |
          git checkout origin/master -- .github/workflows/verify.yml
          rm -f .github/scripts/fix_kernel_root_tests.py .github/kernel-root-test-failure.txt .github/kernel-govulncheck-failure.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --stat
          git commit -m "fix: stabilize Kernel authz contract verification"
          git push origin HEAD:fix/authz-runtime-service-contract
