name: verify

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: kernel-authz-runtime-final
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout final branch
        uses: actions/checkout@v4
        with:
          ref: fix/authz-runtime-final
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up patched Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      - name: Apply validated Kernel source changes
        run: |
          git checkout origin/fix/authz-runtime-service-contract -- \
            authz/service.go \
            authz/service_contract_test.go \
            cmd/kernel/internal/project/project.go \
            cmd/protoc-gen-aisphere-gateway/main.go
          gofmt -w authz/service.go authz/service_contract_test.go cmd/kernel/internal/project/project.go cmd/protoc-gen-aisphere-gateway/main.go

      - name: Download dependencies
        run: go mod download

      - name: Root tests
        run: make test

      - name: Command submodule tests
        run: make test-cmd

      - name: Race tests
        run: make test-race

      - name: Vet
        run: make vet

      - name: Coverage
        run: make cover

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: make vuln

      - name: Commit validated Kernel product changes
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "fix: define Kernel runtime authorization contract"
          fi
          git push origin HEAD:fix/authz-runtime-final
