name: verify

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Download dependencies
        run: go mod download

      - name: Root tests
        run: make test

      - name: Command submodule tests
        run: make test-cmd

      - name: Race tests
        run: make test-race

      - name: Vet
        run: make vet

      - name: Coverage
        run: make cover

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Govulncheck
        run: make vuln
