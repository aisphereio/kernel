name: platform-real-grpc

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - name: Download public Go deps
        run: go mod download
      - name: Test real gRPC platform flow and configurable transports
        run: |
          go test ./serverx ./gatewayx ./validation/platformflow -count=1
