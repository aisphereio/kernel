name: taskx-dapr-deps

on:
  push:
    branches:
      - feat/taskx-dapr-runtime
  pull_request:

permissions:
  contents: write

jobs:
  sync-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/taskx-dapr-runtime
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true
      - name: Normalize and tidy modules
        run: |
          gofmt -w taskx/runtime.go taskx/runtime_test.go taskx/dapr/runtime.go taskx/dapr/runtime_test.go
          go mod tidy
      - name: Unit tests
        run: go test ./taskx/...
      - name: Race tests
        run: go test -race ./taskx/...
      - name: Vet
        run: go vet ./taskx/...
      - name: Commit normalized dependency files
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add go.mod go.sum taskx/runtime.go taskx/runtime_test.go taskx/dapr/runtime.go taskx/dapr/runtime_test.go
          if ! git diff --cached --quiet; then
            git commit -m 'build: tidy and format Dapr runtime provider'
            git push origin HEAD:feat/taskx-dapr-runtime
          fi
