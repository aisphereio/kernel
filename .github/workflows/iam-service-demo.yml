name: kernel-cli-smoke

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  kernel-cli-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Targeted runtime package tests
        run: |
          go test ./authn ./authz ./accessx ./serverx -count=1

      - name: Build kernel CLI and generators
        run: |
          mkdir -p .bin
          GOBIN=$PWD/.bin go install ./cmd/kernel ./cmd/protoc-gen-go-http ./cmd/protoc-gen-go-errors ./cmd/protoc-gen-go-authz ./cmd/protoc-gen-go-gateway ./cmd/protoc-gen-go-deploy ./cmd/protoc-gen-go-kernel ./cmd/buf-check-aisphere

      - name: Smoke kernel CLI help
        run: |
          ./.bin/kernel --help
          ./.bin/kernel new --help
