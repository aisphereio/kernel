syntax = "proto3";

package aisphere.access.v1;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/aisphereio/kernel/aisphere/access/v1;accessv1";

extend google.protobuf.MethodOptions {
  AccessPolicy policy = 51000;
}

message AccessPolicy {
  Exposure exposure = 1;
  Authz authz = 2;
  Audit audit = 3;
  RateLimit rate_limit = 4;
}

enum Exposure {
  EXPOSURE_UNSPECIFIED = 0;
  PUBLIC = 1;
  AUTHENTICATED = 2;
  AUTHORIZED = 3;
  INTERNAL = 4;
}

message Authz {
  string action = 1;
  string resource = 2;
  string audience = 3;
  AuthzMode mode = 4;
}

enum AuthzMode {
  AUTHZ_MODE_UNSPECIFIED = 0;
  CHECK_ONLY = 1;
  ENFORCE = 2;
}

message Audit {
  bool enabled = 1;
  string event = 2;
  string risk = 3;
}

message RateLimit {
  bool enabled = 1;
  string key = 2;
  double qps = 3;
  int32 burst = 4;
  RateLimitBackend backend = 5;
  RateLimitScope scope = 6;
}

enum RateLimitBackend {
  RATE_LIMIT_BACKEND_UNSPECIFIED = 0;
  MEMORY = 1;
  REDIS = 2;
}

enum RateLimitScope {
  RATE_LIMIT_SCOPE_UNSPECIFIED = 0;
  LOCAL_INSTANCE = 1;
  GLOBAL = 2;
}
