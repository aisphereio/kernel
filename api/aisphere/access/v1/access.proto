syntax = "proto3";

package aisphere.access.v1;

import "api/aisphere/options/v1/authz.proto";
import "google/protobuf/descriptor.proto";

option go_package = "github.com/aisphereio/kernel/api/aisphere/access/v1;accessv1";

extend google.protobuf.MethodOptions {
  AccessPolicy policy = 51010;
}

message AccessPolicy {
  Exposure exposure = 1;
  Authz authz = 2;
  Audit audit = 3;
  RateLimit rate_limit = 4;
  Breaker breaker = 5;
  string reason = 6;
  Gateway gateway = 7;
}

enum Exposure {
  EXPOSURE_UNSPECIFIED = 0;
  PUBLIC = 1;
  AUTHENTICATED = 2;
  AUTHORIZED = 3;
  INTERNAL = 4;
  SYSTEM = 5;
}

// Gateway carries optional routing metadata for gateway generators and runtime
// route manifests. It must not be used to suppress publication of a method. The
// decision about whether a route is externally published belongs to generator
// policy derived from exposure, deployment profile, and concrete gateway target.
message Gateway {
  reserved 1;
  reserved "publish";

  repeated string profiles = 2;
  repeated string tags = 3;
}

message Authz {
  string action = 1;
  string resource = 2;
  string audience = 3;
  aisphere.options.v1.AuthzMode mode = 4;
}

message Audit {
  bool enabled = 1;
  string event = 2;
  string risk = 3;
}

message RateLimit {
  bool enabled = 1;
  string key = 2;
  double qps = 3;
  int32 burst = 4;
  Backend backend = 5;
  RateLimitScope scope = 6;
}

enum Backend {
  BACKEND_UNSPECIFIED = 0;
  MEMORY = 1;
  REDIS = 2;
  EXTERNAL = 3;
}

enum RateLimitScope {
  RATE_LIMIT_SCOPE_UNSPECIFIED = 0;
  LOCAL_INSTANCE = 1;
  GLOBAL = 2;
}

message Breaker {
  bool enabled = 1;
  string name = 2;
}
