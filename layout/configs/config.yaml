service:
  name: app
  version: dev
  env: local

server:
  http:
    addr: 0.0.0.0:8000
    timeout_ns: 1000000000
  grpc:
    addr: 0.0.0.0:9000
    timeout_ns: 1000000000

log:
  service_name: app
  env: local
  version: dev
  level: info
  format: console
  output: stdout
  add_source: true
  redact:
    enabled: true
    keys:
      - password
      - secret
      - token
      - access_key
      - secret_key
    value: "***"
  access_log:
    enabled: true
    skip_paths:
      - /healthz
      - /readyz
      - /metrics
    slow_threshold: 1000000000
    request_id_header: X-Request-ID
    route_header: X-Route-Pattern
    log_user_agent: true

data:
  database:
    enabled: false
    config:
      driver: __KERNEL_DB_DRIVER__
      dsn: postgres://postgres:postgres@127.0.0.1:5432/app?sslmode=disable
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime_ns: 1800000000000
      conn_max_idle_time_ns: 300000000000
      query_timeout_ns: 5000000000
      slow_query_threshold_ns: 200000000
      audit_enabled: true
      metrics_enabled: true
  cache:
    enabled: false
    config:
      driver: __KERNEL_CACHE_DRIVER__
      addrs:
        - 127.0.0.1:6379
      db: 0
      key_prefix: app:
      dial_timeout_ns: 5000000000
      read_timeout_ns: 3000000000
      write_timeout_ns: 3000000000
  object_store:
    enabled: false
    config:
      driver: __KERNEL_OBJECTSTORE_DRIVER__
      endpoint: 127.0.0.1:9000
      use_ssl: false
      access_key: minioadmin
      secret_key: minioadmin
      bucket: app
      ensure_bucket: true
      presign_expiry_ns: 900000000000

security:
  authn:
    enabled: false
    provider: __KERNEL_AUTHN_PROVIDER__
    casdoor:
      endpoint: http://127.0.0.1:8000
      organization_name: built-in
      application_name: app
      client_id: app
      client_secret: change-me
      jwt_certificate_file: configs/casdoor.pub
      timeout: 10000000000
      admin:
        enabled: false
  authz:
    enabled: false
    provider: __KERNEL_AUTHZ_PROVIDER__
    dev_allow_all: true
    spicedb:
      endpoint: 127.0.0.1:50051
      token: ""
      transport: grpc
      insecure: true
      timeout: 5000000000
      fully_consistent: true

audit:
  enabled: true
  store: memory

metrics:
  enabled: true
